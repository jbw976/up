# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
    secrets:
      github-token:
        description: 'GitHub token for releases'
        required: true
      xpkg-access-id:
        description: 'XPKG registry access ID'
        required: false
      xpkg-token:
        description: 'XPKG registry token'
        required: false
      aws-role-arn:
        description: 'AWS IAM role ARN for OIDC authentication'
        required: false
      upbound-bot-github-token:
        description: 'GitHub token for private module access'
        required: true
    outputs:
      version:
        description: 'The version that was released'
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    outputs:
      version: v${{ fromJSON(steps.goreleaser.outputs.metadata).version }}
    steps:
      - name: Granting private modules access
        run: |
          git config --global url."https://${{ secrets.upbound-bot-github-token }}:x-oauth-basic@github.com/upbound".insteadOf "https://github.com/upbound"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        id: setup-go
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Mount Go build cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-cache
          path: ~/.cache/go-build

      - name: Mount Go mod cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-mod-cache
          path: ~/go/pkg/mod

      - name: Tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "$VERSION" ]; then
            # If a version wasn't given in the workflow call, generate one by
            # bumping the last tagged version appropriately.
            VERSION=$(go run ./hack/bump-semver "$(git describe --tags)" "$GITHUB_REF_NAME")
          fi
          git tag "$VERSION"

      - name: Login to xpkg.upbound.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.xpkg-access-id }}
          password: ${{ secrets.xpkg-token }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: us-west-2

      - name: Release
        id: goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          S3_BUCKET: public-cli.releases

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: output
          path: |
            _output/up_linux_amd64_v1/up
            _output/up_windows_amd64_v1/up.exe
          if-no-files-found: error

      # All steps below run only for real releases (where a version number is
      # given).

      - name: Checkout upbound/docs
        if: ${{ inputs.version != '' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: upbound/docs
          token: ${{ secrets.upbound-bot-github-token }}
          path: _output/docs

      - name: Generate docs
        if: ${{ inputs.version != '' }}
        run: |
          _output/up_linux_amd64_v1/up generate-docs --output-dir=_output/docs

      - name: Create docs PR
        if: ${{ inputs.version != '' }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.upbound-bot-github-token }}
          path: _output/docs
          commit-message: Update CLI reference docs for ${{ inputs.version }} release
          title: Update CLI reference docs for ${{ inputs.version }} release
          draft: true
          branch: cli-docs-${{ inputs.version }}
