# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

on:
  workflow_call:
    secrets:
      github-token:
        description: 'GitHub token for releases'
        required: true
      xpkg-access-id:
        description: 'XPKG registry access ID'
        required: false
      xpkg-token:
        description: 'XPKG registry token'
        required: false
      aws-usr:
        description: 'AWS access key ID'
        required: false
      aws-psw:
        description: 'AWS secret access key'
        required: false
      upbound-bot-github-token:
        description: 'GitHub token for private module access'
        required: true
    outputs:
      version:
        description: 'The version that was released'
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    outputs:
      version: v${{ fromJSON(steps.goreleaser.outputs.metadata).version }}
    steps:
      - name: Granting private modules access
        run: |
          git config --global url."https://${{ secrets.upbound-bot-github-token }}:x-oauth-basic@github.com/upbound".insteadOf "https://github.com/upbound"

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        id: setup-go
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Mount Go build cache
        uses: useblacksmith/stickydisk@bc0c024fcc3b738a9ad43776e261cbc53fab37af # v1
        with:
          key: ${{ github.repository }}-go-cache
          path: ~/.cache/go-build

      - name: Mount Go mod cache
        uses: useblacksmith/stickydisk@bc0c024fcc3b738a9ad43776e261cbc53fab37af # v1
        with:
          key: ${{ github.repository }}-go-mod-cache
          path: ~/go/pkg/mod

      # If we're building from main or a release branch, create a local tag so
      # that goreleaser will run a non-snapshot release. This tag never gets
      # pushed back to GitHub, it's purely for goreleaser's local use.
      - name: Tag
        if: startsWith(github.ref, 'refs/heads')
        run: |
          # Bump the semver appropriately based on the current branch.
          tmp_tag=$(go run ./hack/bump-semver "$(git describe)" "$GITHUB_REF_NAME")
          git tag "$tmp_tag"

      - name: Login to xpkg.upbound.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.xpkg-access-id }}
          password: ${{ secrets.xpkg-token }}

      - name: Release
        id: goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          AWS_ACCESS_KEY_ID: ${{ secrets.aws-usr }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws-psw }}
          AWS_DEFAULT_REGION: us-west-2
          S3_BUCKET: public-cli.releases

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: output
          path: _output/up_linux_amd64_v1/up
          if-no-files-found: error

      # All steps below run only for real releases (from a tag).

      - name: Checkout upbound/docs
        if: startsWith(github.ref, 'refs/tags')
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: upbound/docs
          token: ${{ secrets.upbound-bot-github-token }}
          path: _output/docs

      - name: Generate docs
        if: startsWith(github.ref, 'refs/tags')
        run: |
          _output/up_linux_amd64_v1/up generate-docs --output-dir=_output/docs

      - name: Create docs PR
        if: startsWith(github.ref, 'refs/tags')
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          token: ${{ secrets.upbound-bot-github-token }}
          path: _output/docs
          commit-message: Update CLI reference docs for ${{ github.ref_name }} release
          title: Update CLI reference docs for ${{ github.ref_name }} release
          draft: true
          branch: cli-docs-${{github.ref_name}}
