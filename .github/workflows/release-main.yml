# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release main

on:
  push:
    branches:
      - main
      - release-*

permissions:
  id-token: write   # Required for OIDC authentication
  contents: write   # Required for release creation

jobs:
  check:
    uses: ./.github/workflows/_check.yml
    with:
      golangci-version: 'v2.6.2'
    secrets:
      upbound-bot-github-token: ${{ secrets.UPBOUND_BOT_GITHUB_TOKEN }}

  release:
    uses: ./.github/workflows/_release.yml
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      xpkg-access-id: ${{ secrets.XPKG_ACCESS_ID }}
      xpkg-token: ${{ secrets.XPKG_TOKEN }}
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN_ARTIFACT_PUBLISH }}
      upbound-bot-github-token: ${{ secrets.UPBOUND_BOT_GITHUB_TOKEN }}

  e2e-tests:
    uses: ./.github/workflows/_e2e.yml
    needs: [release, check]
    with:
      aws-region: us-east-1
    secrets:
      upbound-robot-token: ${{ secrets.UPBOUND_ROBOT_TOKEN }}
      upbound-robot-id: ${{ secrets.UPBOUND_ROBOT_ID }}
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN_E2E_TEST }}
      upbound-bot-github-token: ${{ secrets.UPBOUND_BOT_GITHUB_TOKEN }}

  promote-main:
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/_promote.yml
    needs: [release, e2e-tests]
    with:
      channel: main
      version: ${{ needs.release.outputs.version }}
    secrets:
      xpkg-access-id: ${{ secrets.XPKG_ACCESS_ID }}
      xpkg-token: ${{ secrets.XPKG_TOKEN }}
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN_ARTIFACT_PUBLISH }}
