# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Check

on:
  workflow_call:
    inputs:
      golangci-version:
        description: 'Version of golangci-lint to use'
        required: false
        type: string
        default: 'v2.6.2'
    secrets:
      upbound-bot-github-token:
        description: 'GitHub token for private module access'
        required: true

jobs:
  lint:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Granting private modules access
        run: |
          git config --global url."https://${{ secrets.upbound-bot-github-token }}:x-oauth-basic@github.com/upbound".insteadOf "https://github.com/upbound"

      - name: Setup Go
        id: setup-go
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Mount Go build cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-cache
          path: ~/.cache/go-build

      - name: Mount Go mod cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-mod-cache
          path: ~/go/pkg/mod

      - name: Lint
        uses: useblacksmith/golangci-lint-action@a441b42f4a441117ad7ee20b8d84a061db747efe # v6
        with:
          version: ${{ inputs.golangci-version }}
          only-new-issues: true

  check-diff:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Granting private modules access
        run: |
          git config --global url."https://${{ secrets.upbound-bot-github-token }}:x-oauth-basic@github.com/upbound".insteadOf "https://github.com/upbound"

      - name: Setup Go
        id: setup-go
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Mount Go build cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-cache
          path: ~/.cache/go-build

      - name: Mount Go mod cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-mod-cache
          path: ~/go/pkg/mod

      - name: Check Diff
        run: make check-diff

  unit-tests:
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Granting private modules access
        run: |
          git config --global url."https://${{ secrets.upbound-bot-github-token }}:x-oauth-basic@github.com/upbound".insteadOf "https://github.com/upbound"

      - name: Setup Go
        id: setup-go
        uses: useblacksmith/setup-go@647ac649bd5b480f2a262e3e3e5f4d150ed452ad # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Mount Go build cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-cache
          path: ~/.cache/go-build

      - name: Mount Go mod cache
        uses: useblacksmith/stickydisk@a652394bf1bf95399f406e648482b41fbd25c51f # v1
        with:
          key: ${{ github.repository }}-go-mod-cache
          path: ~/go/pkg/mod

      - name: Run Unit Tests
        run: |
          make integration-test
