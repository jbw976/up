name: Renovate
on:
  # Allows manual/automated trigger for debugging purposes
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate's log level"
        required: true
        default: "info"
        type: string
  schedule:
    - cron: '0 8 * * *'

env:
  LOG_LEVEL: "info"

jobs:
  renovate:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: |
      !github.event.repository.fork &&
      !github.event.pull_request.head.repo.fork
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      # Renovate needs SSH auth instead of the HTTPS auth we use in our other
      # actions.
      - name: Granting private modules access with SSH
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.UPBOUND_BOT_GITHUB_SSH_PRIVATE_KEY }}

      # Don't waste time starting Renovate if JSON is invalid
      - name: Validate Renovate JSON
        run:  npx --yes --package renovate -- renovate-config-validator

      - name: Get token
        id: get-github-app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2
        with:
          app-id: ${{ secrets.RENOVATE_GITHUB_APP_ID }}
          private-key: ${{ secrets.RENOVATE_GITHUB_APP_PRIVATE_KEY }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@8ac70de2fe55752c573155866e30735411e3b61c # v41.0.22
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Use GitHub API to create commits
          RENOVATE_PLATFORM_COMMIT: "true"
          LOG_LEVEL: ${{ github.event.inputs.logLevel || env.LOG_LEVEL }}
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^git submodule update --init$", "^make generate$", "^install-tool golang \\$\\(grep -oP \"\\^go \\\\K\\.\\+\" go\\.mod\\)$", "^make go.lint$"]'
          # Configure git to use SSH for auth instead of HTTPS, since we have an
          # ssh-agent to pull private modules.
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: 'url."git@github.com:".insteadOf'
          GIT_CONFIG_VALUE_0: 'https://github.com/'
        with:
          configurationFile: .github/renovate.json5
          token: '${{ secrets.UPBOUND_BOT_GITHUB_TOKEN }}'
          # Mount in the ssh auth socket.
          docker-volumes: |
            ${{ env.SSH_AUTH_SOCK }}:${{ env.SSH_AUTH_SOCK }}
          # Pass the SSH_AUTH_SOCK and GIT_CONFIG_* envvars through to the
          # renovate docker container.
          env-regex: "^(?:RENOVATE_\\w+|LOG_LEVEL|GITHUB_COM_TOKEN|NODE_OPTIONS|SSH_AUTH_SOCK|GIT_CONFIG_\\w+)$"
