# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - 'v*'
  pull_request: {}
  workflow_dispatch: {}
  merge_group:
    types: [checks_requested]

permissions:
  id-token: write   # Required for OIDC authentication
  contents: write   # Required for release creation

jobs:
  check:
    uses: ./.github/workflows/_check.yml
    with:
      golangci-version: 'v1.64.8'
    secrets:
      upbound-bot-github-token: ${{ secrets.UPBOUND_BOT_GITHUB_TOKEN }}

  build:
    uses: ./.github/workflows/_build.yml
    with:
      docker-buildx-version: 'v0.17.1'
      create-release: ${{ startsWith(github.ref, 'refs/tags/') }}
      promote-main: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      docker-usr: ${{ secrets.DOCKER_USR }}
      docker-psw: ${{ secrets.DOCKER_PSW }}
      xpkg-access-id: ${{ secrets.XPKG_ACCESS_ID }}
      xpkg-token: ${{ secrets.XPKG_TOKEN }}
      aws-usr: ${{ secrets.AWS_USR }}
      aws-psw: ${{ secrets.AWS_PSW }}
      upbound-bot-github-token: ${{ secrets.UPBOUND_BOT_GITHUB_TOKEN }}

  e2e-tests:
    uses: ./.github/workflows/_e2e.yml
    needs: [build, check]
    with:
      platform-arch: ${{ needs.build.outputs.platform-arch }}
      aws-region: us-east-1
    secrets:
      upbound-robot-token: ${{ secrets.UPBOUND_ROBOT_TOKEN }}
      upbound-robot-id: ${{ secrets.UPBOUND_ROBOT_ID }}
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
