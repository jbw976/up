# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Promote

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to promote (e.g. v0.1.0)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: string
    secrets:
      xpkg-access-id:
        description: 'XPKG registry access ID'
        required: false
      xpkg-token:
        description: 'XPKG registry token'
        required: false
      aws-usr:
        description: 'AWS access key ID'
        required: false
      aws-psw:
        description: 'AWS secret access key'
        required: false

jobs:
  promote-artifacts:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Login to Upbound
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.xpkg-access-id }}
          password: ${{ secrets.xpkg-token }}

      - name: Promote Artifacts in S3 and xpkg
        run: hack/promote.sh
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          S3_BUCKET: public-cli.releases
          OCI_REPOSITORY: xpkg.upbound.io/upbound/up-cli
          AWS_ACCESS_KEY_ID: ${{ secrets.aws-usr }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws-psw }}
          AWS_DEFAULT_REGION: us-west-2
