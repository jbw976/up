# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Promote

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to promote (e.g. v0.1.0)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: string
    secrets:
      xpkg-access-id:
        description: 'XPKG registry access ID'
        required: false
      xpkg-token:
        description: 'XPKG registry token'
        required: false
      aws-role-arn:
        description: 'AWS IAM role ARN for OIDC authentication'
        required: false

jobs:
  promote-artifacts:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Login to Upbound
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.xpkg-access-id }}
          password: ${{ secrets.xpkg-token }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: us-west-2

      - name: Promote Artifacts in S3 and xpkg
        run: hack/promote.sh
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          S3_BUCKET: public-cli.releases
          OCI_REPOSITORY: xpkg.upbound.io/upbound/up-cli
